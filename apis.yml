apis:
  - name: Elliptic AML API
    description: REST API for automated AML compliance screening of cryptocurrency transactions and wallets. Provides batch and synchronous endpoints for wallet risk scoring, transaction analysis, customer management, and risk rule configuration across 60+ blockchain networks.
