name: Elliptic API Plans
description: Elliptic does not publicly publish tiered pricing plans. Access to the AML API and AI API is available through enterprise agreements. Interested parties are directed to schedule a demo or contact the sales team for custom pricing based on volume and use case.
url: https://www.elliptic.co/get-started
plans:
  - name: Enterprise
    description: Custom enterprise pricing for financial institutions, exchanges, DeFi platforms, stablecoin issuers, and other regulated entities. Pricing is based on screening volume, blockchain coverage, and compliance workflow requirements. Includes access to the AML API, AI API, Lens product, and support services.
    url: https://www.elliptic.co/get-started
    pricing:
      model: custom
      description: Contact sales for pricing. No publicly listed tiers or per-unit rates.
    features:
