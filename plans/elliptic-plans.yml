      - Customer-level aggregated insights
      - Risk graph traversal and entity identification
      - Configurable risk rules and alerting
      - Webhook integration for real-time alerts
      - SDKs for Node.js, Python, and PHP
      - 1B+ labeled crypto addresses
      - 99% coverage of global trading volume
      - AML compliance workflows
      - Indirect risk reporting for fiat transactions
      - Blocklists for exchange protection
    contact:
      url: https://www.elliptic.co/get-started
      description: Schedule a demo or use the Crypto Compliance Calculator for personalized cost projections
